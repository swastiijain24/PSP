services:
  postgres:
    image: postgres:16-alpine
    container_name: payment-service-provider-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5435:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
  
volumes:
  postgres-data: